[package]
name = "duck_net"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
license = "MIT"
description = "DuckDB extension for comprehensive HTTP/HTTPS network client operations"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
quack_rs = { version = "0.7", package = "quack-rs" }
libduckdb-sys = { version = "=1.10501.0", features = ["loadable-extension"] }
ureq = { version = "3.3", features = ["multipart"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
